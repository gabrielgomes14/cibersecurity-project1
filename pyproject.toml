[tool.ruff]
line-length = 140
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
ignore_missing_imports = true
disallow_untyped_decorators = false
files = ["data", "logic", "components", "views", "app.py", "tests"]

[[tool.mypy.overrides]]
module = ["streamlit.*", "plotly.*", "reportlab.*", "pandas.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
